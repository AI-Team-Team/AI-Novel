# ==========================================
# Agent Role-to-Model Assignment Map
# ==========================================
models:
  # Key references from config/ai_model_config.yaml
  default_model: "gemma4-26b"
  architect_model: "gemma4-26b"
  planner_model: "gemma4-26b"
  writer_model: "local-AI"
  critic_model: "gemma4-26b"
  scanner_model: "local-AI"
  embedding_model: "emb"

# ==========================================
# Paths / Project Configuration
# ==========================================
project:
  db_path: "novel/process/facts/facts.db"
  faiss_index_path: "novel/process/facts/vector_index.faiss"
  novel_title: "Untitled Novel"
  output_dir: "novel/main_text"
  frame_dir: "novel/frame"
  process_dir: "novel/process"
  # Language: matches folder name in i18n/ (e.g., en, zh-CN)
  language: "en"
  # Language guard confidence thresholds:
  min_confidence: 0.80
  max_other_confidence: 0.10

# ==========================================
# Retrieval / Constraint Controls
# ==========================================
retrieval:
  tier_1_relevance_threshold: 0.9
  tier_3_search_limit: 5

# ==========================================
# Workflow Controls
# ==========================================
workflow:
  world_discussion_rounds: 1
  plot_discussion_rounds: 1
  detailed_plot_discussion_rounds: 1
  chapter_guide_discussion_rounds: 1
  chapter_revision_rounds: 1
  chapter_text_discussion_rounds: 1
  auto_generation_max_retries: 3
  language_rewrite_max_attempts: 2
  conflict_discussion_rounds: 2

  # Blocking conflict governance mode:
  # - "auto_keep_existing": auto-resolve BLOCKING conflicts by keep_existing before gating.
  # - "manual_block": never auto-resolve BLOCKING conflicts; fail fast until resolved manually.
  blocking_conflict_mode: "manual_block"

# ==========================================
# Experimental AI Autonomy & Delegation
# ==========================================
autonomy:
  enable_autonomy_suite: True           # Master toggle to enable/disable entire autonomy suite
  enable_autonomous_queries: True       # Global toggle for tool use loops
  enable_dynamic_delegation: True       # Global toggle for spawning subagents
  max_delegation_depth: 2               # Depth 0 (root) -> Depth 1 (child) -> Depth 2 (grandchild)
  min_subagent_team_size: 3             # Minimum sibling team size required to spawn
  max_subagent_team_size: 5             # Max sibling team size
  subagent_discussion_rounds: 2         # Discussion rounds inside subagent panels
  react_max_steps: 5                    # Max reasoning loop steps for an agent turn
  inbox_summarize_threshold_chars: 1500 # Threshold to compress cascading inbox alerts
  large_file_threshold_kb: 50           # Files larger than this return outline warning
  max_chunk_lines: 200                  # Paginated lines per read request
  enable_budget_monitoring: True        # Toggle to enable/disable supervisor budget monitoring
  total_token_budget_usd: 2.00          # Supervisor termination budget cap per session
  enable_memory_compression: True       # Compress older messages when memory exceeds turns
  max_memory_turns: 20                  # Maximum turns to retain before memory compression
  failover_policy: "auto"               # Route strategy on client errors ("auto" or "parent")
  enable_emergency_wakeup: True         # Wake up idle parent teams on high-priority anomalies
  emergency_discussion_rounds: 1        # Rounds of debate for emergency wake-ups
  tool_calling_mode: "auto"             # Tool strategy: "text_react", "native", or "auto"
  max_tool_rounds: 5                    # Max reasoning loop steps for native parallel execution
  strict_state_persistence: True        # ORM cascading deletions for unreferenced state
